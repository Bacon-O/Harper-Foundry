name: Harper Kernel Factory
on:
  push:
    branches: [ main, dev, feature/* ]
  workflow_dispatch:
    inputs:
      config_file:
        description: 'Blueprint to use'
        default: 'params/foundry.params'

jobs:
  preheat:
    runs-on: self-hosted
    outputs:
      args: ${{ steps.set-args.outputs.args }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Configure Arguments
        id: set-args
        run: |
          # The logic is centralized here:
          # 1. Manual triggers (workflow_dispatch) use the user-provided input.
          # 2. Main branch pushes use the production foundry.params.
          # 3. Everything else (dev, features, fixes) uses _testing.foundry.params.
          
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            FILE="${{ github.event.inputs.config_file }}"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            FILE="params/foundry.params"
          else
            FILE="params/_testing.foundry.params"
          fi
          
          echo "🚀 Selected Blueprint: $FILE"
          echo "args=--config-file $FILE" >> $GITHUB_OUTPUT
      
      - name: Charge Audit
        run: bash ./scripts/furnace_preheat.sh ${{ steps.set-args.outputs.args }}

  smelt:
    needs: preheat
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      
      - name: Ignition
        # This script sources env_setup.sh, which in turn sources your selected param file.
        run: bash ./scripts/furnace_ignite.sh ${{ needs.preheat.outputs.args }}

  analysis:
    needs: [preheat, smelt]
    if: always()
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      
      - name: Material QA
        run: |
          # QA will naturally look at /testing or /release because it uses the same param file logic.
          bash ./scripts/material_analysis.sh ${{ needs.preheat.outputs.args }}

  cleanup:
    needs: [preheat, analysis]
    if: always() 
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Purge Slag
        run: bash ./scripts/furnace_clean.sh ${{ needs.preheat.outputs.args }}