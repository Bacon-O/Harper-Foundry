name: Harper Kernel Factory
on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows you to trigger it manually from the "Actions" tab

jobs:
  kernel-pipeline:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Foundry (Build)
        run: bash ./start_build.sh

      - name: Proving Ground (Test)
        run: bash ./smoke_test.sh