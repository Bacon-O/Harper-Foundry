name: Harper Kernel Factory
on:
  push:
    branches: [ main, dev, feature/* ]
    tags:
      - 'v*' # Triggers on tags like v1.0, v2.1-beta, etc.
  workflow_dispatch:
    inputs:
      config_file:
        description: 'Blueprint to use'
        default: 'params/foundry.params'

jobs:
  preheat:
    runs-on: self-hosted
    outputs:
      args: ${{ steps.set-args.outputs.args }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Configure Arguments
        id: set-args
        run: |
          # 1. Manual Dispatch: Use the exact file the user selected in the UI
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            FILE="${{ github.event.inputs.config_file }}"
            echo "🕹️ Manual Dispatch detected."
          
          # 2. Production Logic: Must be a Version Tag on the Main branch
          # This ensures code is "released" intentionally.
          elif [[ "${{ github.ref }}" == refs/tags/v* ]] && [[ "${{ github.event.base_ref }}" == "refs/heads/main" || "${{ github.ref_name }}" =~ ^v ]]; then
            FILE="params/foundry.params"
            echo "🏷️ Production Tag detected on Main branch."
          
          # 3. Default (Safe Mode): Everything else goes to Testing
          # This covers all standard pushes to main, dev, or feature branches.
          else
            FILE="params/_testing.foundry.params"
            echo "🧪 Standard push detected. Routing to Testing."
          fi
          
          echo "🚀 Selected Blueprint: $FILE"
          echo "args=--config-file $FILE" >> $GITHUB_OUTPUT
      
      - name: Charge Audit
        run: bash ./scripts/furnace_preheat.sh ${{ steps.set-args.outputs.args }}

  smelt:
    needs: preheat
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      
      - name: Ignition
        run: bash ./scripts/furnace_ignite.sh ${{ needs.preheat.outputs.args }}

  analysis:
    needs: [preheat, smelt]
    if: always()
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      
      - name: Material QA
        run: bash ./scripts/material_analysis.sh ${{ needs.preheat.outputs.args }}

  cleanup:
    needs: [preheat, analysis]
    if: always() 
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Purge Slag
        run: bash ./scripts/furnace_clean.sh ${{ needs.preheat.outputs.args }}