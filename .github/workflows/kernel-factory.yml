name: Harper Kernel Factory
on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      config_file:
        description: 'Blueprint to use'
        default: 'params/foundry.params'
      test_run:
        description: 'Toggle Tinyconfig Test'
        type: boolean
        default: false

jobs:
  preheat:
    runs-on: self-hosted
    outputs:
      args: ${{ steps.set-args.outputs.args }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Configure Arguments
        id: set-args
        run: |
          ARGS="--config-file ${{ github.event.inputs.config_file || 'params/foundry.params' }}"
          [[ "${{ github.event.inputs.test_run }}" == "true" ]] && ARGS="$ARGS --test-run"
          echo "args=$ARGS" >> $GITHUB_OUTPUT
      
      - name: Charge Audit
        run: bash ./scripts/furnace_preheat.sh ${{ steps.set-args.outputs.args }}

  smelt:
    needs: preheat
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      
      - name: Ignition
        run: bash ./scripts/furnace_ignite.sh ${{ needs.preheat.outputs.args }}

  analysis:
    needs: [preheat, smelt]
    if: always() # Run even if smelt fails to check logs/configs
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      
      - name: Material QA
        run: |
          source ./scripts/env_setup.sh ${{ needs.preheat.outputs.args }}
          if [ "$BYPASS_QA" == "true" ]; then
            echo "🛡️ QA Bypassed via Configuration"
          else
            # Analysis will now look at the latest build even if it was a partial failure
            bash ./scripts/material_analysis.sh ${{ needs.preheat.outputs.args }}
          fi

  cleanup:
    needs: [preheat, analysis]
    if: always() 
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Purge Slag
        run: bash ./scripts/furnace_clean.sh ${{ needs.preheat.outputs.args }}