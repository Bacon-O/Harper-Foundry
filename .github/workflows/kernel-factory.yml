name: Harper Kernel Factory
on:
  push:
    branches:
      - main  # Automatic trigger whenever you push to main
  workflow_dispatch: # Allows manual trigger on ANY branch via the UI

jobs:
  kernel-pipeline:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Foundry (Build)
        run: bash ./start_build.sh

      - name: Proving Ground (Test)
        run: bash ./scripts/smoke_test.sh