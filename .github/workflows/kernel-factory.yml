name: Harper Kernel Factory

# Build Strategy:
# - Manual dispatch only: Dual dropdown - select base params + optional testing overrides
# - This is a public reference repo - shadow repo has production pipelines

on:
  workflow_dispatch:
    inputs:
      base_params:
        description: 'Base Configuration'
        type: choice
        required: true
        default: 'tinyconfig.params'
        options:
          - 'tinyconfig.params'
          - 'harper_deb13.params'
      
      override_mode:
        description: 'Apply Override'
        type: choice
        required: true
        default: 'none'
        options:
          - 'none'
          - 'testing.params (test output dir)'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update -y
          sudo apt-get install -y shellcheck

      # Note: *.params files are intentionally excluded from linting.
      # They are configuration files (VAR=value assignments), not executable scripts.
      - name: Shellcheck
        run: |
          mapfile -t files < <(git ls-files "*.sh")
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No shell scripts found."
            exit 0
          fi
          shellcheck -x "${files[@]}"

  preheat:
    # TODO: Re-enable lint job once all shellcheck issues are resolved
    # needs: lint
    runs-on: self-hosted
    outputs:
      args: ${{ steps.set-args.outputs.args }}
      production_config: ${{ steps.set-args.outputs.production_config }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Configure Arguments
        id: set-args
        run: |
          PROD_CONFIG=""
          
          # Manual dispatch is the only trigger for this public reference repo
          # Use dual dropdown selection: base params + optional override
          BASE_PARAMS="${{ github.event.inputs.base_params }}"
          OVERRIDE_MODE="${{ github.event.inputs.override_mode }}"
          
          echo "🕹️ Manual Dispatch"
          echo "   Base: $BASE_PARAMS"
          echo "   Override: $OVERRIDE_MODE"
          
          # Check if override mode is selected
          if [[ "$OVERRIDE_MODE" == "testing.params"* ]]; then
            # Use _test_overrides.params with PRODUCTION_CONFIG env var
            FILE="params/_test_overrides.params"
            PROD_CONFIG="$BASE_PARAMS"
            echo "🧪 Applying testing overrides to $BASE_PARAMS"
            echo "   → Output: /mnt/build-data/dist/testing"
            echo "   → QA Mode: ENFORCED"
          else
            # Use base params directly (no override)
            FILE="params/$BASE_PARAMS"
            echo "📦 Using $BASE_PARAMS directly (no overrides)"
          fi
          
          echo "🚀 Selected Blueprint: $FILE"
          echo "args=--params-file $FILE" >> $GITHUB_OUTPUT
          echo "production_config=$PROD_CONFIG" >> $GITHUB_OUTPUT
      
      - name: Charge Audit
        env:
          PRODUCTION_CONFIG: ${{ steps.set-args.outputs.production_config }}
        run: |
          bash ./scripts/furnace_preheat.sh ${{ steps.set-args.outputs.args }}

  smelt:
    needs: preheat
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      
      - name: Ignition
        env:
          PRODUCTION_CONFIG: ${{ needs.preheat.outputs.production_config }}
        run: |
          bash ./scripts/furnace_ignite.sh ${{ needs.preheat.outputs.args }}

  analysis:
    needs: [preheat, smelt]
    if: always()
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      
      - name: Material QA
        env:
          PRODUCTION_CONFIG: ${{ needs.preheat.outputs.production_config }}
        run: |
          bash ./scripts/material_analysis.sh ${{ needs.preheat.outputs.args }}

  cleanup:
    needs: [preheat, analysis]
    if: always() 
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Purge Slag
        env:
          PRODUCTION_CONFIG: ${{ needs.preheat.outputs.production_config }}
        run: |
          bash ./scripts/furnace_clean.sh ${{ needs.preheat.outputs.args }}