name: Harper Kernel Factory

# Build Strategy:
# - Production (tags on main): Full production build (params/foundry.params)
# - Main branch: Full testing build (params/_testing.foundry.params)
# - Dev/Feature branches: Fast tinyconfig (2-5 min) for quick validation
# - Manual dispatch: User selects which configuration to use

on:
  push:
    branches: [ main, dev, feature/* ]
    tags:
      - 'v*' # Triggers on tags like v1.0, v2.1-beta, etc.
  workflow_dispatch:
    inputs:
      config_file:
        description: 'Forge Profile'
        type: choice
        default: 'params/tinyconfig.foundry.params'
        options:
          - 'params/tinyconfig.foundry.params'
          - 'params/_testing.foundry.params'
          - 'params/foundry.params'

jobs:
  preheat:
    runs-on: self-hosted
    outputs:
      args: ${{ steps.set-args.outputs.args }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Configure Arguments
        id: set-args
        run: |
          # 1. Manual Dispatch: Use the dropdown selection
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            FILE="${{ github.event.inputs.config_file }}"
            echo "🕹️ Manual Dispatch: $FILE"
          
          # 2. Production Logic: Must be a Version Tag on the Main branch
          elif [[ "${{ github.ref }}" == refs/tags/v* ]] && [[ "${{ github.event.base_ref }}" == "refs/heads/main" || "${{ github.ref_name }}" =~ ^v ]]; then
            FILE="params/foundry.params"
            echo "🏷️ Production Tag on Main detected."
          
          # 3. Feature branches: Use fast tinyconfig for quick validation
          elif [[ "${{ github.ref }}" == refs/heads/feature/* ]]; then
            FILE="params/tinyconfig.foundry.params"
            echo "🧪 Feature branch: Using tinyconfig for fast validation."
          
          # 4. Dev branch: Use tinyconfig for speed
          elif [[ "${{ github.ref }}" == refs/heads/dev ]]; then
            FILE="params/tinyconfig.foundry.params"
            echo "🧪 Dev branch: Using tinyconfig for fast testing."
          
          # 5. Main branch: Use full testing build
          elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
            FILE="params/_testing.foundry.params"
            echo "🏗️ Main branch: Using full testing configuration."
          
          # 6. Default: Everything else uses tinyconfig for speed
          else
            FILE="params/tinyconfig.foundry.params"
            echo "🧪 Default: Using tinyconfig for fast validation."
          fi
          
          echo "🚀 Selected Blueprint: $FILE"
          echo "args=--config-file $FILE" >> $GITHUB_OUTPUT
      
      - name: Charge Audit
        run: bash ./scripts/furnace_preheat.sh ${{ steps.set-args.outputs.args }}

  smelt:
    needs: preheat
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      
      - name: Ignition
        run: bash ./scripts/furnace_ignite.sh ${{ needs.preheat.outputs.args }}

  analysis:
    needs: [preheat, smelt]
    if: always()
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      
      - name: Material QA
        run: bash ./scripts/material_analysis.sh ${{ needs.preheat.outputs.args }}

  cleanup:
    needs: [preheat, analysis]
    if: always() 
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Purge Slag
        run: bash ./scripts/furnace_clean.sh ${{ needs.preheat.outputs.args }}