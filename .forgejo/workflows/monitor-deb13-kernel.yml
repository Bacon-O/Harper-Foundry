name: Monitor Debian Trixie Kernel Releases

# Trigger on schedule (check for new releases every 6 hours)
on:
  # schedule:
  #   - cron: '0 */6 * * *'  # Every 6 hours
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build'
        type: boolean
        required: false
        default: 'false'


jobs:
  monitor-and-power:
    name: Check Version and Power On Alice
    runs-on: power-control  # This is your Debian container runner
    outputs:
      build_needed: ${{ steps.check.outputs.force_build }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Kernel & Power On
        env:
          FORCE_BUILD_INPUT: ${{ github.event.inputs.force_build }}
          WORKSPACE_PATH: ${{ github.workspace }}
        id: check
        run: |
          source ./scripts/plugins/triggers/runner.sh
          cd "$WORKSPACE_PATH"
          FORCE_OPT=""
          if [[ "$FORCE_BUILD_INPUT" = "true" ]]; then
            echo "Forcing build"
            FORCE_OPT="--force"
          else
            echo "No build forced - normal operation"
          fi
          
          check_if_build_is_needed harper_deb13_kernel $FORCE_OPT
          build_return_code=$?
          if [[ "$build_return_code" -eq 0 ]]; then
            echo "build_needed=true" >> $GITHUB_OUTPUT
            echo "🚀 New kernel found. Waking Alice..."
            /scripts/alice_power.sh on
          else
            echo "build_needed=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No update needed."
          fi
  
  compile-on-alice:
    name: Build Harper Kernel
    needs: monitor-and-power
    if: needs.monitor-and-power.outputs.build_needed == 'true'
    runs-on: alice-builder  # This must match the label on Alice's runner  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Run kernel release trigger
        env:
          FORCE_BUILD_INPUT: ${{ github.event.inputs.force_build }}
          WORKSPACE_PATH: ${{ github.workspace }}
        run: |
          cd "$WORKSPACE_PATH"
          FORCE_OPT=""
          if [[ "$FORCE_BUILD_INPUT" = "true" ]]; then
            echo "Forcing build"
            FORCE_OPT="--force"
          else
            echo "No build forced - normal operation"
          fi
          
          # Source runner and execute trigger check
          source ./scripts/plugins/triggers/runner.sh
          
          check_if_build_is_needed harper_deb13_kernel $FORCE_OPT
          BUILD_NEEDED=$?
          
          if [[ $BUILD_NEEDED -eq 0 ]]; then
            echo "✅ Build needed for detected kernel version: ${DETECTED_KERNEL_VERSION}"
            
            # Execute build with tinyconfig for CI testing
            if ./start_build.sh --params-file params/tinyconfig.params 2>&1 | tee -a /tmp/build.log; then
              echo "✅ Build completed successfully"
              # Update tracking via plugin callback
              build_successful harper_deb13_kernel
            else
              echo "❌ Build failed"
              # Handle failure via plugin callback
              build_failed harper_deb13_kernel "ci_build_failed"
            fi
          else
            echo "ℹ️  No new kernel version available"
          fi
      
      - name: Commit updated version tracking (if changed)
        if: success()
        run: |
          cd "$WORKSPACE_PATH"
          
          # Check if version tracking file was updated by build_successful callback
          if git diff --quiet version_tracking/harper_deb13_latest_kernel.txt; then
            echo "ℹ️  No version changes to commit"
          else
            echo "✅ Version tracking updated - committing changes"
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add version_tracking/harper_deb13_latest_kernel.txt
            git commit -m "Update tracked kernel version [skip ci]"
            git push || echo "⚠️  Could not push (may be read-only)"
          fi
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Kernel release check failed"
          exit 1
