name: Monitor Debian Trixie Kernel Releases

# Trigger on schedule
# m h * * *
# CDT to UTC, CDT + 5
on:
  schedule:
    - cron: '35 19 * * *'
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build'
        type: boolean
        required: false
        default: 'false'

env:
  YML__API_TOKEN: ${{ secrets.FORGEJO_API_READ_TOKEN  }}
  YML__FORGEJO_URL: ${{ github.api_url }} 
  YML__FORCE_BUILD_INPUT: ${{ github.event.inputs.force_build }}
  YML__WORKSPACE_PATH: ${{ github.workspace }}
  # YML__PARAMS_FILE: params/tinyconfig.params
  YML__PARAMS_FILE: params/harper_deb13.params
  YML__KERNEL_TITLE: Harper
  YML__KERNEL_TRIGGER_LABEL: harper_deb13_kernel
  YML__KERNEL_TRACKING_FILE: version_tracking/harper_deb13_latest_kernel.txt
  # web UI vars - Are here for reference
  # vars.RUNNER_BUILDER_LABEL 
  # vars.RUNNER_TRIGGER_LABEL
  YML__FORGEJO_RUNNER_BUILDER: ${{ vars.RUNNER_BUILDER_LABEL }}
  YML__FORGEJO_RUNNER_TRIGGER: ${{ vars.RUNNER_TRIGGER_LABEL }}

jobs:
  monitor-and-power:
    runs-on: ${{ vars.RUNNER_TRIGGER_LABEL }}
    name: Check Version and Power On Builder
    outputs:
      build_needed: ${{ steps.check.outputs.build_needed }}
      detected_kernel_version: ${{ steps.check.outputs.detected_kernel_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Kernel & Power On
        env:
          FORCE_BUILD_INPUT: ${{ github.event.inputs.force_build }}
        id: check
        run: |
          cd "$YML__WORKSPACE_PATH"
          source ./scripts/plugins/triggers/runner.sh
          FORCE_OPT=""
          if [[ "$FORCE_BUILD_INPUT" = "true" ]]; then
            echo "Forcing build"
            FORCE_OPT="--force"
          else
            echo "No build forced - normal operation"
          fi
          
          check_if_build_is_needed $YML__KERNEL_TRIGGER_LABEL $FORCE_OPT
          build_return_code=$?
          if [[ "$build_return_code" -eq 0 ]]; then
            echo "build_needed=true" >> $GITHUB_OUTPUT
            echo "detected_kernel_version=${DETECTED_KERNEL_VERSION}" >> $GITHUB_OUTPUT
            
            echo "🚀 New kernel found. Waking $YML__FORGEJO_RUNNER_BUILDER..."
            /scripts/alice_power.sh on
          else
            echo "build_needed=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No update needed."
          fi
  
  compile-on-builder:
    runs-on: ${{ vars.RUNNER_BUILDER_LABEL }}
    name: Build Kernel
    needs: monitor-and-power
    if: needs.monitor-and-power.outputs.build_needed == 'true' && needs.monitor-and-power.outputs.detected_kernel_version != ''
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Build Kernel start_build.sh 
        env:
          FORCE_BUILD_INPUT: ${{ github.event.inputs.force_build }}
          DETECTED_KERNEL_VERSION: ${{ needs.monitor-and-power.outputs.detected_kernel_version }}
          BUILD_NEEDED: ${{ needs.monitor-and-power.outputs.build_needed }}
        run: |
          cd "$YML__WORKSPACE_PATH"

          export DETECTED_KERNEL_VERSION
          source ./scripts/plugins/triggers/runner.sh
          
          if [[ $BUILD_NEEDED == "true" ]]; then
            echo "✅ Build needed for detected kernel version: ${DETECTED_KERNEL_VERSION}"
            
            # Execute build with tinyconfig for CI testing
            if ./start_build.sh --params-file "$YML__PARAMS_FILE" 2>&1 | tee -a /tmp/build.log; then
              echo "✅ Build completed successfully"
              
              # Update tracking via plugin callback
              build_successful $YML__KERNEL_TRIGGER_LABEL
            else
              echo "❌ Build failed"
              
              # Handle failure via plugin callback
              build_failed $YML__KERNEL_TRIGGER_LABEL "ci_build_failed"
            fi
          else
            echo "ℹ️  No new kernel version available"
          fi
      
      - name: Commit updated version tracking (if changed)
        if: success()
        run: |
          cd "$YML__WORKSPACE_PATH"
          # TODO script this
          # Check if version tracking file was updated by build_successful callback
          if git diff --quiet $YML__KERNEL_TRACKING_FILE; then
            echo "ℹ️  No version changes to commit"
          else
            echo "✅ Version tracking updated - committing changes"
            git config --local user.email "$YML__FORGEJO_RUNNER_BUILDER@localhost.com"
            git config --local user.name "$YML__FORGEJO_RUNNER_BUILDER"
            git add $YML__KERNEL_TRACKING_FILE
            git commit -m "Update tracked kernel version [skip ci]"
            git push || echo "⚠️  Could not push (may be read-only)"
          fi
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Kernel release check failed"
          exit 1
      
      # Ensure this runs regardless of previous step outcomes to power off Alice
      - name: Check Queue then Power Off Builder
        if: always()
        run: |
          echo "Checking if build queue is empty before powering off $YML__FORGEJO_RUNNER_BUILDER..."
          cd "$YML__WORKSPACE_PATH"
          
          ./scripts/plugins/tools/forgejo_runner_safe_shutdown.sh \
            --params-file "$YML__PARAMS_FILE" \
            --api-token "$YML__API_TOKEN" \
            --forgejo-url "$YML__FORGEJO_URL" \
            --forgejo-label "$YML__FORGEJO_RUNNER_BUILDER"
