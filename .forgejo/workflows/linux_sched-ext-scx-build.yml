name: sched-ext SCX Build

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build'
        type: boolean
        required: false
        default: false

env:
  YML__API_TOKEN: ${{ secrets.FORGEJO_API_READ_TOKEN }}
  YML__FORGEJO_URL: ${{ github.api_url }}
  YML__FORCE_BUILD_INPUT: ${{ github.event.inputs.force_build }}
  YML__WORKSPACE_PATH: ${{ github.workspace }}
  YML__PARAMS_FILE: params/params.d/int_linux_sched-ext_scx.params
  YML__SOFTWARE_TITLE: sched-ext SCX
  YML__SOFTWARE_TRIGGER_LABEL: linux_sched_ext_scx
  YML__SOFTWARE_TRACKING_FILE: version_tracking/linux_sched-ext_scx_latest.txt
  # web UI vars - here for reference
  # vars.RUNNER_BUILDER_LABEL
  # vars.RUNNER_TRIGGER_LABEL
  YML__FORGEJO_RUNNER_BUILDER: ${{ vars.RUNNER_BUILDER_LABEL }}
  YML__FORGEJO_RUNNER_TRIGGER: ${{ vars.RUNNER_TRIGGER_LABEL }}

jobs:
  compile_on_builder:
    runs-on: self-hosted
    name: Build sched-ext SCX
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Charge Audit
        run: |
          ./scripts/validate.sh --params-file "$YML__PARAMS_FILE"

      - name: Build with start_build.sh
        env:
          FORCE_BUILD_INPUT: ${{ github.event.inputs.force_build }}
        run: |
          cd "$YML__WORKSPACE_PATH"
          source ./scripts/plugins/triggers/runner.sh

          FORCE_OPT=""
          if [[ "$FORCE_BUILD_INPUT" = "true" ]]; then
            echo "Build forcing set"
            FORCE_OPT="--force"
          fi

          build_return_code=0
          check_if_build_is_needed "$YML__SOFTWARE_TRIGGER_LABEL" $FORCE_OPT || build_return_code=$?

          if [[ "$build_return_code" -eq 0 ]]; then
            echo "Starting sched-ext/scx build"
            if ./start_build.sh --params-file "$YML__PARAMS_FILE" 2>&1 | tee -a /tmp/build.log; then
              echo "Build completed successfully"
              build_successful "$YML__SOFTWARE_TRIGGER_LABEL"
            else
              echo "Build failed"
              build_failed "$YML__SOFTWARE_TRIGGER_LABEL" "ci_build_failed"
            fi
          else
            echo "Build skipped. Version already built or no action needed."
          fi

      - name: Commit updated version tracking (if changed)
        if: success()
        run: |
          cd "$YML__WORKSPACE_PATH"

          if git diff --quiet "$YML__SOFTWARE_TRACKING_FILE"; then
            echo "No version changes to commit"
          else
            echo "Version tracking updated - committing changes"
            git config --local user.email "github-runner@localhost.com"
            git config --local user.name "github-runner"
            git add "$YML__SOFTWARE_TRACKING_FILE"
            git commit -m "Update tracked sched-ext/scx version [skip ci]"
            git push || echo "Could not push (may be read-only)"
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "sched-ext/scx build failed"
          exit 1
   
      # - name: Check Queue then Power Off Builder
      #   if: always()
      #   run: |
      #     echo "Checking if build queue is empty before powering off $YML__FORGEJO_RUNNER_BUILDER..."
      #     cd "$YML__WORKSPACE_PATH"

      #     ./scripts/scripts.d/plugins/tools/forgejo_runner_safe_shutdown.sh \
      #       --params-file "$YML__PARAMS_FILE" \
      #       --api-token "$YML__API_TOKEN" \
      #       --forgejo-url "$YML__FORGEJO_URL" \
      #       --forgejo-label "$YML__FORGEJO_RUNNER_BUILDER"